name: Build Armbian Image for RK3566 EVB1 DDR4 V10

on:
  workflow_dispatch:
    inputs:
      release:
        description: 'Debian release'
        required: true
        type: choice
        default: 'bookworm'
        options:
          - bookworm
          - bullseye
      build_type:
        description: 'Build type'
        required: true
        type: choice
        default: 'minimal'
        options:
          - minimal
          - server

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout DTS repository
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          echo "=== Before cleanup ==="
          df -h
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/.ghcup
          sudo apt-get clean
          sudo docker image prune -a -f 2>/dev/null || true
          echo "=== After cleanup ==="
          df -h

      - name: Install QEMU and binfmt support (arm64 cross-build)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq qemu-user-static binfmt-support
          sudo update-binfmts --enable qemu-arm
          sudo update-binfmts --enable qemu-aarch64
          echo "=== QEMU binfmt ready ==="
          ls -la /proc/sys/fs/binfmt_misc/qemu-*
          echo "---"
          cat /proc/sys/fs/binfmt_misc/qemu-aarch64 2>/dev/null || echo "(qemu-aarch64 status not readable via proc)"

      - name: Clone Armbian build framework
        run: |
          echo "=== Cloning Armbian build framework ==="
          git clone --depth=1 https://github.com/armbian/build.git armbian-build
          echo "=== Framework ready ==="

      - name: Create kernel userpatch (add board DTS)
        run: |
          echo "=== Creating kernel patch directory ==="
          KERNEL_PATCH_DIR="armbian-build/userpatches/kernel/archive/rk35xx-vendor-6.1"
          mkdir -p "${KERNEL_PATCH_DIR}"

          echo "=== Copying board DTS to kernel source ==="
          # Copy DTS into a patch that places it in arch/arm64/boot/dts/rockchip/
          cp rk3566-evb1-ddr4-v10.dts "${KERNEL_PATCH_DIR}/"

          echo "=== Creating Makefile patch to compile our DTB ==="
          cat > "${KERNEL_PATCH_DIR}/add-board-dtb.patch" << 'PATCHEOF'
          diff --git a/arch/arm64/boot/dts/rockchip/Makefile b/arch/arm64/boot/dts/rockchip/Makefile
          index 0000000..0000000 100644
          --- a/arch/arm64/boot/dts/rockchip/Makefile
          +++ b/arch/arm64/boot/dts/rockchip/Makefile
          @@ -0,0 +1,1 @@
          +dtb-$(CONFIG_ARCH_ROCKCHIP) += rk3566-evb1-ddr4-v10.dtb
          PATCHEOF

          # The real approach: use a script hook instead of a patch
          # because the exact Makefile content varies between kernel versions.
          # Use customize-kernel.sh which runs after kernel source is prepared.
          cat > armbian-build/userpatches/customize-kernel.sh << 'HOOKEOF'
          #!/bin/bash
          #
          # Armbian customize-kernel.sh hook
          # Adds our board DTS to the kernel tree and registers it for compilation
          #

          echo "--- Adding RK3566 EVB1 DDR4 V10 DTS to kernel tree ---"

          DTS_SRC="${SRC}/userpatches/kernel/archive/rk35xx-vendor-6.1/rk3566-evb1-ddr4-v10.dts"
          DTS_DST="arch/arm64/boot/dts/rockchip/rk3566-evb1-ddr4-v10.dtb"
          MAKEFILE="arch/arm64/boot/dts/rockchip/Makefile"

          # Copy the DTS file
          if [ -f "${DTS_SRC}" ]; then
            cp -v "${SRC}/userpatches/kernel/archive/rk35xx-vendor-6.1/rk3566-evb1-ddr4-v10.dts" \
               arch/arm64/boot/dts/rockchip/
            echo "DTS file copied to kernel tree."
          else
            echo "WARNING: DTS source not found at ${DTS_SRC}"
            exit 1
          fi

          # Add compilation target to Makefile if not already present
          if ! grep -q "rk3566-evb1-ddr4-v10.dtb" "${MAKEFILE}"; then
            echo 'dtb-$(CONFIG_ARCH_ROCKCHIP) += rk3566-evb1-ddr4-v10.dtb' >> "${MAKEFILE}"
            echo "Makefile updated with new DTB target."
          else
            echo "DTB target already exists in Makefile."
          fi

          echo "--- Kernel customization complete ---"
          HOOKEOF
          chmod +x armbian-build/userpatches/customize-kernel.sh
          echo "customize-kernel.sh created."

      - name: Create image customization hook
        run: |
          cat > armbian-build/userpatches/customize-image.sh << 'HOOKEOF'
          #!/bin/bash
          #
          # Armbian customize-image.sh hook
          # Ensures the boot configuration uses our board DTB
          #

          echo "--- Customizing image for RK3566 EVB1 DDR4 V10 ---"

          # Set the boot configuration to use our DTB
          if [ -f "${SDCARD}/boot/armbianEnv.txt" ]; then
            sed -i '/^fdtfile=/d' ${SDCARD}/boot/armbianEnv.txt
            echo "fdtfile=rockchip/rk3566-evb1-ddr4-v10.dtb" >> ${SDCARD}/boot/armbianEnv.txt
            echo "armbianEnv.txt updated."
            echo "=== Final armbianEnv.txt ==="
            cat ${SDCARD}/boot/armbianEnv.txt
          else
            echo "WARNING: armbianEnv.txt not found"
          fi

          echo "--- Image customization complete ---"
          HOOKEOF
          chmod +x armbian-build/userpatches/customize-image.sh
          echo "customize-image.sh created."

      - name: Configure board
        run: |
          cat > armbian-build/config/boards/rk3566-evb1-ddr4-v10.csc << 'CSCEOF'
          # Rockchip RK3566 EVB1 DDR4 V10
          # PMIC: RK809 + TCS4525 (vdd_cpu)
          # Memory: DDR4
          # Storage: eMMC + SD card
          # Ethernet: RTL8111H via PCIe
          # WiFi/BT: RTL8821CS (SDIO + UART)
          BOARD_NAME="RK3566 EVB1 DDR4 V10"
          BOARD_VENDOR="rockchip"
          BOOT_SOC="rk3566"
          BOARDFAMILY="rk35xx"
          BOOTCONFIG="rk3568_defconfig"
          KERNEL_TARGET="vendor"
          FULL_DESKTOP="no"
          BOOT_LOGO="no"
          BOOT_SCENARIO="spl-blobs"
          BOOT_FDT_FILE="rockchip/rk3566-evb1-ddr4-v10.dtb"
          IMAGE_PARTITION_TABLE="gpt"
          CSCEOF

          echo "=== Board configuration ==="
          cat armbian-build/config/boards/rk3566-evb1-ddr4-v10.csc

      - name: Build Armbian image
        run: |
          cd armbian-build

          echo "=== Starting Armbian build ==="
          echo "Board: rk3566-evb1-ddr4-v10"
          echo "Family: rk35xx"
          echo "Kernel: vendor (BSP 6.1 rk-6.1-rkr5.1)"
          echo "Release: ${{ github.event.inputs.release || 'bookworm' }}"
          echo "Build type: ${{ github.event.inputs.build_type || 'minimal' }}"

          if [ "${{ github.event.inputs.build_type || 'minimal' }}" = "minimal" ]; then
            MINIMAL_FLAG="BUILD_MINIMAL=yes"
          else
            MINIMAL_FLAG="BUILD_MINIMAL=no"
          fi

          ./compile.sh \
            BOARD=rk3566-evb1-ddr4-v10 \
            BRANCH=vendor \
            BUILD_DESKTOP=no \
            ${MINIMAL_FLAG} \
            KERNEL_CONFIGURE=no \
            RELEASE=${{ github.event.inputs.release || 'bookworm' }}
        env:
          SKIP_EXTERNAL_WARNING: "yes"

      - name: List output artifacts
        run: |
          echo "=== Build output ==="
          find armbian-build/output -type f \( -name "*.img" -o -name "*.img.xz" -o -name "*.img.gz" \) 2>/dev/null || echo "No image files found"
          echo "---"
          ls -lah armbian-build/output/images/ 2>/dev/null || echo "No images directory"
          echo "---"
          ls -lah armbian-build/output/debs/ 2>/dev/null || echo "No debs directory"

      - name: Upload Armbian image artifact
        uses: actions/upload-artifact@v4
        with:
          name: armbian-rk3566-evb1-ddr4-v10
          path: |
            armbian-build/output/images/*.img
            armbian-build/output/images/*.img.xz
            armbian-build/output/images/*.img.gz
            armbian-build/output/images/*.img.txt
          retention-days: 7