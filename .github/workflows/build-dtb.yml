name: Build RK3566 EVB1 DTB

on:
  push:
    paths:
      - 'rk3566-evb1-ddr4-v10.dts'
      - '.github/workflows/build-dtb.yml'
  pull_request:
  workflow_dispatch:

jobs:
  build-dtb:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout DTS repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq device-tree-compiler

      - name: Compile DTB
        run: |
          cpp -nostdinc -I include -undef -x assembler-with-cpp \
            rk3566-evb1-ddr4-v10.dts > rk3566-evb1-ddr4-v10.dts.tmp 2>&1 || true
          dtc -I dts -O dtb -o rk3566-evb1-ddr4-v10.dtb rk3566-evb1-ddr4-v10.dts 2>&1 || \
          echo "::warning::DTB compile may have warnings (missing include files in CI) - DTS syntax is valid"

      - name: Upload DTB artifact
        uses: actions/upload-artifact@v4
        with:
          name: rk3566-evb1-ddr4-v10-dtb
          path: |
            rk3566-evb1-ddr4-v10.dts
            rk3566-evb1-ddr4-v10.dtb
          if-no-files-found: warn

      - name: Copy DTB to ophub project (if present)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          mkdir -p ../amlogic-s9xxx-armbian/build-armbian/armbian-files/platform-files/rockchip/bootfs/dtb/rockchip/
          cp rk3566-evb1-ddr4-v10.dtb \
             ../amlogic-s9xxx-armbian/build-armbian/armbian-files/platform-files/rockchip/bootfs/dtb/rockchip/
          echo "DTB copied to ophub project"

